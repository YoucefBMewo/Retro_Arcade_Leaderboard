services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: leaderboard_server
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - redis_network
      - db_network

  redis:
    image: redis:latest
    container_name: leaderboard_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5
    networks:
      - redis_network

  db:
    image: postgres:17-alpine
    container_name: leaderboard_db
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5
    networks:
      - db_network
    volumes:
      - db_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: leaderboard_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - backend_network
      - redis_network
      - db_network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: leaderboard_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro,Z
      - ./grafana/dashboards:/etc/grafana/dashboards:ro,Z
    ports:
      - "3000:3000"
    networks:
      - redis_network
      - db_network
    depends_on:
      - prometheus

networks:
  redis_network:
  db_network:
  backend_network:

volumes:
  db_data:
  prometheus_data:
  grafana_data: