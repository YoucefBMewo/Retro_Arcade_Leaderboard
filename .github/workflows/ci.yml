name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # Build + Lint + Tests
  build-test:
    name: Build / Lint / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test

  #  Analyse des dépendances
  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit (HIGH + CRITICAL)
        run: npm audit --audit-level=high

  #  3. SAST Semgrep
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (nodejs + secrets + OWASP)
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/nodejs
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  #  Build image Docker + Scan Trivy 
  docker-scan:
    name: Docker Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t arcade-leaderboard:ci .

      - name: Scan image (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arcade-leaderboard:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
