services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: leaderboard_server
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app:Z
      - server_node_modules:/app/node_modules:Z
    networks:
      - app_network

  redis:
    image: redis:latest
    container_name: leaderboard_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5
    networks:
      - app_network

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    container_name: leaderboard_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5
    networks:
      - app_network
    volumes:
      - db_data:/var/lib/postgresql/data

networks:
  app_network:

volumes:
  server_node_modules:
  db_data: